<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Scholarship Portal | Find Your Future</title>
    <!-- We will link our beautiful styling here later -->
    <link rel="stylesheet" href="style.css">
    <!-- A modern font to make it look premium -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hero Section (The eye-catching top part) -->
    <header class="hero">
        <div class="hero-content">
            <h1>Unlock Your <span class="highlight">Future.</span></h1>
            <p>Discover fully funded, partially funded, and self-funded scholarships from top universities around the world.</p>
            
            <!-- The Search Engine -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by country, university, or keyword...">
                
                <div class="filters">
                    <select id="fundingFilter">
                        <option value="All">All Funding Types</option>
                        <option value="Fully Funded">Fully Funded</option>
                        <option value="Partially Funded">Partially Funded</option>
                        <option value="Self Funded">Self Funded</option>
                    </select>

                    <select id="levelFilter">
                        <option value="All">All Degree Levels</option>
                        <option value="Bachelors">Bachelors</option>
                        <option value="Masters">Masters</option>
                        <option value="PhD">PhD</option>
                        <option value="Short Course">Short Course</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <!-- The Data Analytics / Results Counter -->
    <section class="stats-section">
        <p id="results-count">Loading scholarships...</p>
    </section>

    <!-- Where the Magic Happens (The Grid of Scholarships) -->
    <main>
        <div id="scholarship-grid" class="grid">
            <!-- JavaScript will inject the scholarship cards right here -->
        </div>
    </main>

    <!-- We link our brain (JavaScript) here -->
    <script src="script.js"></script>
</body>
</html>
